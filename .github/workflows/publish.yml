name: Publish to PyPI

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    # Run only when push commit message contains release labels
    if: |
      contains(github.event.head_commit.message, 'release:major') ||
      contains(github.event.head_commit.message, 'release:minor') ||
      contains(github.event.head_commit.message, 'release:patch')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install tools
        run: pip install bump-my-version build

      - name: Extract version
        id: version
        run: |
          VERSION=$(bump-my-version show current_version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        id: test-pypi
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false
          
      - name: Publish to PyPI
        id: pypi
        if: steps.test-pypi.outcome == 'success'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          skip-existing: true

      - name: Create GitHub Release
        if: steps.pypi.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: false
